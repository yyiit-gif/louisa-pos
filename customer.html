<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>路易莎咖啡</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--org:#E87722;--org-dark:#C45E0A;--org-light:#FFF3E8;--bg:#F5F5F5;--white:#fff;--text:#1a1a1a;--muted:#888;--border:#E8E8E8;--red:#E53935;--nav-h:64px;--top-h:52px;}
html,body{height:100%;background:#f0ede8}
body{font-family:'Noto Sans TC',sans-serif;color:var(--text);max-width:420px;margin:0 auto;background:var(--white);position:relative;min-height:100vh}
#root{display:flex;flex-direction:column;min-height:100vh}
.top-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;z-index:100;background:var(--white);border-bottom:1px solid var(--border);height:var(--top-h);display:flex;align-items:center;padding:0 16px;justify-content:space-between}
.top-bar h1{font-size:17px;font-weight:700}
.back{font-size:20px;cursor:pointer;padding:4px 8px 4px 0;color:var(--text)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--white);border-top:1px solid var(--border);display:flex;height:var(--nav-h);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-size:11px;color:var(--muted);border:none;background:none;font-family:inherit;transition:color .15s}
.nav-btn.active{color:var(--org)}
.nav-btn .ni{font-size:22px}
.page-wrap{padding-top:var(--top-h);padding-bottom:calc(var(--nav-h) + 4px);min-height:100vh;background:var(--bg)}
.section-title{font-size:17px;font-weight:700;color:var(--org);margin-bottom:10px}
.store-card{background:var(--white);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.store-img{width:100%;height:140px;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:50px}
.store-info{padding:12px 16px}
.store-name{font-size:16px;font-weight:700;margin-bottom:3px}
.store-meta{font-size:12px;color:var(--muted)}
.launch-btn{width:calc(100% - 32px);margin:8px 16px 16px;padding:16px;background:var(--org);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:block}
.search-box{display:flex;align-items:center;gap:8px;background:#f0f0f0;border-radius:24px;padding:10px 16px;margin:0 16px 4px}
.search-box input{flex:1;border:none;background:none;outline:none;font-size:14px;font-family:inherit;color:var(--text)}
.loc-bar{display:flex;align-items:center;gap:6px;padding:10px 16px 6px;font-size:14px;font-weight:500}
.cat-bar{display:flex;border-bottom:2px solid var(--border);background:var(--white);position:sticky;top:var(--top-h);z-index:50;overflow-x:auto}
.cat-bar::-webkit-scrollbar,.time-scroll-hide::-webkit-scrollbar{display:none}
.time-scroll-hide{-ms-overflow-style:none;scrollbar-width:none}
.cat-item{padding:12px 18px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.cat-item.active{color:var(--org);border-bottom-color:var(--org);font-weight:700}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px 80px}
.prod-card{background:var(--white);border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.06);transition:transform .15s}
.prod-card:active{transform:scale(.97)}
.prod-card img{width:100%;height:130px;object-fit:cover;background:#f5f0eb}
.prod-info{padding:8px 10px 12px}
.prod-name{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3}
.prod-price{font-size:14px;font-weight:700;color:var(--org)}
.modal-wrap{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,.45)}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 40px;max-height:90vh;overflow-y:auto;position:relative}
.opt-chips{display:flex;flex-wrap:wrap;gap:8px}
.opt-chip{padding:10px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:all .12s;background:var(--white);font-family:inherit}
.opt-chip.sel{border-color:var(--org);color:var(--org);font-weight:600;background:var(--org-light)}
.cart-section{background:var(--white);border-radius:12px;padding:16px;margin-bottom:12px}
.cart-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0}
.divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.pay-chip{padding:10px 20px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;background:var(--white);font-family:inherit;transition:all .12s}
.pay-chip.sel{border-color:var(--org);color:var(--org);font-weight:600;background:var(--org-light)}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.step-dot.done,.step-dot.active{background:var(--org);color:#fff}
.step-dot.pending{background:#e0e0e0;color:#888}
.step-line{flex:1;height:2px;background:#e0e0e0;margin:0 6px}
.step-line.done{background:var(--org)}
.step-label{font-size:10px;text-align:center;margin-top:4px;white-space:nowrap}
.order-info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.order-info-row:last-child{border-bottom:none}
.order-no-bar{background:var(--org);color:#fff;border-radius:8px;padding:10px 16px;font-size:16px;font-weight:700;margin-bottom:14px}
.member-block{background:var(--white);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 24px;border-radius:24px;font-size:13px;z-index:999;white-space:nowrap;animation:fi .2s;pointer-events:none}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:10px;color:var(--muted)}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--org);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* 揪團 group bar */
.group-bar{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;border-top:2px solid var(--org);padding:8px 12px;z-index:99;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const db=supabase.createClient(
  'https://rvkfhetfdgsjmapztocd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2a2ZoZXRmZGdzam1hcHp0b2NkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTA1NjcsImV4cCI6MjA5NTc4NjU2N30.4oBlbOX62v4AZJdpcG21NqBLa3IBMiv9-2WMmMU_8kU'
);
const FOOD_CATS=['輕食','甜點'];
const STORES=[
  {id:1,name:'路易莎 逢甲大學店',short:'逢甲大學店',addr:'台中市西屯區文華路100號',phone:'04-24523131',dist:'2.1'},
  {id:2,name:'路易莎 新大墩向心店',short:'新大墩向心店',addr:'台中市南屯區大墩路301號',phone:'04-24726613',dist:'3.4'},
  {id:3,name:'路易莎 台中一中店',short:'台中一中店',addr:'台中市北區育才街100號',phone:'04-22220000',dist:'4.2'},
  {id:4,name:'路易莎 中港路店',short:'中港路店',addr:'台中市西屯區中港路二段100號',phone:'04-23171234',dist:'1.8'},
  {id:5,name:'路易莎 公益路店',short:'公益路店',addr:'台中市西區公益路168號',phone:'04-23019999',dist:'5.1'},
];

function useToast(){
  const[t,setT]=useState(null);
  useEffect(()=>{if(t){const id=setTimeout(()=>setT(null),2300);return()=>clearTimeout(id);}},[t]);
  return[setT,t?<div className="toast">{t}</div>:null];
}

function getTimeSlots(mode){
  const slots=[];const now=new Date();
  const minMins=mode==='self'?15:40;
  const earliest=new Date(now.getTime()+minMins*60000);
  const dayStart=new Date(now);dayStart.setHours(7,30,0,0);
  const dayEnd=new Date(now);dayEnd.setHours(20,30,0,0);
  let s=new Date(Math.max(earliest.getTime(),dayStart.getTime()));
  const m=s.getMinutes();const r=Math.ceil(m/15)*15;
  s.setMinutes(r>=60?0:r,0,0);if(r>=60)s.setHours(s.getHours()+1);
  let cur=new Date(s);
  while(cur<=dayEnd){slots.push(new Date(cur));cur=new Date(cur.getTime()+15*60000);}
  return slots;
}

/* ─── CHECKOUT SHEET (3 steps) used in GroupBottomBar ─── */
function CheckoutSheet({groupRoom,groupItems,currentStore,onClose,showToast,setConfirmOrder,setGroupRoom,setTab}){
  const[step,setStep]=useState(1);
  const[pickup,setPickup]=useState('self');
  const[pay,setPay]=useState('LINE Pay');
  const[name,setName]=useState(groupRoom.creator_name||'');
  const[phone,setPhone]=useState('');
  const[invType,setInvType]=useState('mobile');
  const[carrier,setCarrier]=useState('');
  const[taxId,setTaxId]=useState('');
  const[loading,setLoading]=useState(false);
  const[expanded,setExpanded]=useState({});
  const[pickupTime,setPickupTime]=useState(()=>getTimeSlots('self')[0]||new Date());
  const slots=useMemo(()=>getTimeSlots(pickup),[pickup]);

  const totalAll=groupItems.reduce((s,m)=>s+(m.subtotal||0),0);
  const totalQty=groupItems.reduce((s,m)=>s+((m.items||[]).reduce((ss,i)=>ss+(i.qty||1),0)),0);

  function switchPickup(v){setPickup(v);const ns=getTimeSlots(v);if(ns.length)setPickupTime(ns[0]);}
  function toggleMember(id){setExpanded(e=>({...e,[id]:!e[id]}));}

  async function doCheckout(){
    if(!name.trim()){showToast('請填寫取貨人姓名');return;}
    if(!phone.trim()){showToast('請填寫聯絡電話');return;}
    if(!pickupTime){showToast('請選擇取餐時間');return;}
    setLoading(true);
    const allItems=[];
    groupItems.forEach(m=>(m.items||[]).forEach(i=>allItems.push({...i,member:m.member_name})));
    const no='M'+Math.floor(1000000000+Math.random()*9000000000);
    const insertData={
      order_no:no,
      items:allItems,
      total:totalAll,
      payment_method:pay,
      status:'paid',
      pickup_time:pickupTime.toISOString(),
      member_phone:phone||null,
      recipient_name:name,
    };
    if(invType) insertData.inv_type=invType;
    if(invType==='mobile'&&carrier) insertData.mobile_carrier=carrier;
    if(taxId) insertData.tax_id=taxId;
    const{error}=await db.from('orders').insert([insertData]);
    await db.from('group_orders').update({status:'closed'}).eq('room_code',groupRoom.room_code);
    setLoading(false);
    if(!error){
      setConfirmOrder({
        no,total:totalAll,pickup_time:pickupTime.toISOString(),pickup,pay,items:allItems,
        isGroup:true,groupItems,recipientName:name,phone,invType,mobileCarrier:carrier,taxId,
        storeName:currentStore.name,storePhone:currentStore.phone,storeAddr:currentStore.addr,
      });
      setGroupRoom(null);onClose();setTab('confirm');
    } else showToast('❌ 結帳失敗：'+error.message);
  }

  const inp={width:'100%',border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',fontSize:15,fontFamily:'inherit',outline:'none',display:'block'};
  const focIn=e=>e.target.style.borderColor='var(--org)';
  const focOut=e=>e.target.style.borderColor='var(--border)';

  return(
    <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'var(--bg)',borderRadius:'24px 24px 0 0',maxHeight:'93vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* header */}
        <div style={{background:'#fff',borderRadius:'24px 24px 0 0',padding:'16px 20px 0',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:16}}>LOUISA COFFEE</div>
            <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#aaa'}}>✕</button>
          </div>
          <div style={{display:'flex',alignItems:'flex-start',paddingBottom:12}}>
            {[{n:1,l:'確認明細'},{n:2,l:'取餐資訊'},{n:3,l:'付款確認'}].map((s,i,arr)=>(
              <React.Fragment key={s.n}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,minWidth:56}}>
                  <div className={`step-dot ${step>s.n?'done':step===s.n?'active':'pending'}`}>{s.n}</div>
                  <div className="step-label" style={{color:step>=s.n?'var(--org)':'#aaa',fontWeight:step===s.n?700:400}}>{s.l}</div>
                </div>
                {i<arr.length-1&&<div className={`step-line ${step>s.n?'done':''}`} style={{marginTop:14}}/>}
              </React.Fragment>
            ))}
          </div>
        </div>

        <div style={{overflowY:'auto',flex:1,padding:'12px 16px 28px'}}>

          {/* STEP 1 確認明細 */}
          {step===1&&<div>
            <div style={{background:'var(--org)',borderRadius:12,padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',color:'#fff',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{background:'rgba(255,255,255,.3)',borderRadius:6,padding:'4px 10px',fontWeight:700}}>{totalQty} 份</span>
                <span style={{fontWeight:700,fontSize:15}}>應付金額</span>
              </div>
              <span style={{fontSize:22,fontWeight:900}}>NT${totalAll}</span>
            </div>
            {groupItems.length===0&&<div style={{textAlign:'center',padding:'30px 0',color:'var(--muted)',fontSize:14}}>還沒有人點餐</div>}
            {groupItems.map(member=>{
              const cnt=(member.items||[]).reduce((s,i)=>s+(i.qty||1),0);
              const open=expanded[member.id];
              return(
                <div key={member.id} className="member-block">
                  <div onClick={()=>toggleMember(member.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',cursor:'pointer'}}>
                    <div style={{width:40,height:40,borderRadius:'50%',background:'var(--org)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,flexShrink:0}}>{(member.member_name||'?')[0]}</div>
                    <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{member.member_name}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>NT${member.subtotal||0} / {cnt}份</div></div>
                    <span style={{fontSize:16,color:'var(--org)',transform:open?'rotate(180deg)':'none',transition:'transform .2s',display:'inline-block'}}>⌄</span>
                  </div>
                  {open&&<div style={{background:'#f9f9f9',padding:'0 16px 12px'}}>
                    {(member.items||[]).map((item,idx)=>(
                      <div key={idx} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderTop:'1px solid #eee'}}>
                        <div><div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
                          <div style={{fontSize:11,color:'var(--muted)'}}>{item.opts&&!item.isFood&&[item.opts.spec,item.opts.sugar,item.opts.milk].filter(Boolean).join(' / ')}</div>
                        </div>
                        <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                          <div style={{fontSize:13,fontWeight:600,color:'var(--org)'}}>NT${(item.price||0)*(item.qty||1)}</div>
                          <div style={{fontSize:11,color:'var(--muted)'}}>{item.qty||1}份</div>
                        </div>
                      </div>
                    ))}
                  </div>}
                </div>
              );
            })}
            <button onClick={()=>{const allOpen=groupItems.every(m=>expanded[m.id]);const n={};if(!allOpen)groupItems.forEach(m=>n[m.id]=true);setExpanded(n);}}
              style={{width:'100%',padding:'11px',background:'#fff',border:'1.5px solid var(--border)',borderRadius:20,fontSize:13,fontFamily:'inherit',color:'var(--muted)',cursor:'pointer',marginTop:6,marginBottom:12}}>
              {groupItems.every(m=>expanded[m.id])?'收合所有訂單 ⌃':'展開所有訂單 ⌄'}
            </button>
            <button onClick={()=>setStep(2)} disabled={groupItems.length===0}
              style={{width:'100%',padding:15,background:groupItems.length===0?'#ccc':'var(--org)',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:groupItems.length===0?'not-allowed':'pointer'}}>
              下一步 →
            </button>
          </div>}

          {/* STEP 2 取貨人/電話 */}
          {step===2&&<div>
            <div className="cart-section">
              <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>取貨人姓名</div>
              <input style={inp} value={name} onChange={e=>setName(e.target.value)} placeholder="例：陳小明" onFocus={focIn} onBlur={focOut}/>
            </div>
            <div className="cart-section">
              <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>聯絡電話</div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <div style={{width:14,height:14,borderRadius:'50%',border:'2px solid var(--org)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:'var(--org)'}}/>
                </div>
                <span style={{fontSize:13}}>手機號碼</span>
              </div>
              <input style={inp} value={phone} onChange={e=>setPhone(e.target.value)} placeholder="0912345678" onFocus={focIn} onBlur={focOut}/>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:5,textAlign:'right'}}>只支援台灣手機號碼</div>
            </div>
            <div className="cart-section">
              <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>給店家留言</div>
              <div style={{border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',fontSize:13,color:'var(--muted)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>可留備用電話供店家聯繫</span><span style={{color:'var(--org)'}}>›</span>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep(1)} style={{flex:1,padding:14,background:'#fff',border:'1.5px solid var(--border)',borderRadius:12,fontSize:14,fontFamily:'inherit',fontWeight:600,cursor:'pointer'}}>上一步</button>
              <button onClick={()=>{if(!name.trim()){showToast('請填寫取貨人姓名');return;}if(!phone.trim()){showToast('請填寫聯絡電話');return;}setStep(3);}}
                style={{flex:2,padding:14,background:'var(--org)',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>下一步 →</button>
            </div>
          </div>}

          {/* STEP 3 取餐方式/時間/付款/發票 */}
          {step===3&&<div>
            {/* 取貨方式 */}
            <div className="cart-section">
              <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>取貨方式</div>
              <div style={{display:'flex',gap:10,marginBottom:10}}>
                {[{v:'self',l:'自取'},{v:'delivery',l:'外送'}].map(o=>(
                  <button key={o.v} onClick={()=>switchPickup(o.v)}
                    style={{flex:1,padding:'11px',border:`1.5px solid ${pickup===o.v?'var(--org)':'var(--border)'}`,borderRadius:10,background:pickup===o.v?'var(--org-light)':'#fff',color:pickup===o.v?'var(--org)':'var(--text)',fontFamily:'inherit',fontSize:13,cursor:'pointer',fontWeight:pickup===o.v?700:400}}>
                    {o.l}
                  </button>
                ))}
              </div>
              {pickup==='self'&&<div style={{background:'#f5f5f5',borderRadius:8,padding:'9px 12px',fontSize:12,color:'#555',display:'flex',alignItems:'center',gap:6}}>
                <span>📍</span><span>{currentStore.addr}</span>
              </div>}
            </div>
            {/* 取餐時間 */}
            <div className="cart-section">
              <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>預計取貨時間</div>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>取貨時間會依門市現場狀況調整</div>
              {slots.length===0
                ?<div style={{background:'#f5f5f5',borderRadius:8,padding:12,textAlign:'center',fontSize:13,color:'var(--muted)'}}>今日已無可選時段</div>

              <div style={{marginTop:4}}>

            <div style={{background:'var(--org)',borderRadius:12,padding:'13px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',color:'#fff',marginBottom:12}}>

                <span style={{background:'rgba(255,255,255,.3)',borderRadius:6,padding:'3px 8px',fontWeight:700,fontSize:13}}>{totalQty} 份</span>
                <span style={{fontWeight:700,fontSize:14}}>應付金額</span>

            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep(2)} style={{flex:1,padding:14,background:'#fff',border:'1.5px solid var(--border)',borderRadius:12,fontSize:14,fontFamily:'inherit',fontWeight:600,cursor:'pointer'}}>上一步</button>
              <button onClick={doCheckout} disabled={loading||!pickupTime||slots.length===0}
                style={{flex:2,padding:14,background:loading||slots.length===0?'#ccc':'var(--org)',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:(loading||slots.length===0)?'not-allowed':'pointer'}}>
                {loading?'送出中...':'送出訂單'}
              </button>
            </div>
          </div>}

        </div>
      </div>
    </div>
  );
}

/* ─── GROUP BOTTOM BAR ─── */
function GroupBottomBar({groupRoom,myName,currentStore,showToast,setGroupRoom,setConfirmOrder,setTab}){
  const[groupItems,setGroupItems]=useState([]);
  const[showPanel,setShowPanel]=useState(false);
  const[showCheckout,setShowCheckout]=useState(false);

  const loadItems=useCallback(async()=>{
    const{data}=await db.from('group_items').select('*').eq('room_code',groupRoom.room_code).order('created_at');
    setGroupItems((data||[]).filter(m=>(m.items||[]).length>0));
  },[groupRoom.room_code]);

  useEffect(()=>{loadItems();const t=setInterval(loadItems,4000);return()=>clearInterval(t);},[loadItems]);

  const totalAll=groupItems.reduce((s,m)=>s+(m.subtotal||0),0);
  const totalQty=groupItems.reduce((s,m)=>s+((m.items||[]).reduce((ss,i)=>ss+(i.qty||1),0)),0);
  const memberCount=groupItems.length;

  async function openCheckout(){
    if(memberCount===0){showToast('⚠️ 還沒有人點餐');return;}
    setShowPanel(false);
    setShowCheckout(true);
  }

  // 非主揪：只顯示等待主揪結帳
  if(!groupRoom.isCreator){
    return(
      <div className="group-bar">
        <div style={{textAlign:'center',fontSize:13,color:'var(--muted)',padding:'4px 0'}}>
          🎉 揪團中 <strong style={{color:'var(--org)'}}>{groupRoom.room_code}</strong> · 等待主揪 <strong>{groupRoom.creator_name}</strong> 結帳
        </div>
      </div>
    );
  }

  return(
    <>
      {/* 主揪：兩個按鈕 */}
      <div className="group-bar">
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setShowPanel(true)}
            style={{flex:1,padding:'9px 8px',background:'#f5f5f5',border:'1.5px solid var(--border)',borderRadius:10,fontSize:12,fontFamily:'inherit',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <span>👥 團員點過</span>
            {memberCount>0&&<span style={{background:'var(--org)',color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:700}}>{memberCount}</span>}
          </button>
          <button onClick={openCheckout}
            style={{flex:1,padding:'9px 8px',background:'var(--org)',border:'none',borderRadius:10,fontSize:12,fontFamily:'inherit',fontWeight:700,cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
            🛒 一般商品結帳
          </button>
        </div>
      </div>

      {/* 團員點過 Panel */}
      {showPanel&&(
        <div className="modal-wrap" onClick={()=>setShowPanel(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:'20px 20px 0 0',maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid #f0f0f0',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div style={{fontWeight:700,fontSize:16}}>👥 團員點過的品項</div>
              <button onClick={()=>setShowPanel(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#aaa'}}>✕</button>
            </div>
            <div style={{overflowY:'auto',flex:1,padding:'8px 0 20px'}}>
              {memberCount===0
                ?<div style={{textAlign:'center',padding:'40px 20px',color:'#aaa',fontSize:14}}>還沒有人點餐</div>
                :groupItems.map(member=>{
                  const cnt=(member.items||[]).reduce((s,i)=>s+(i.qty||1),0);
                  return(
                    <div key={member.id} style={{borderBottom:'1px solid #f0f0f0'}}>
                      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 20px',background:'#fff'}}>
                        <div style={{width:44,height:44,borderRadius:'50%',background:'var(--org)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:700}}>{(member.member_name||'?')[0]}</div>
                        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{member.member_name}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:1}}>NT${member.subtotal||0} / {cnt}份</div></div>
                      </div>
                      <div style={{background:'#f8f8f8',padding:'0 20px 10px'}}>
                        {(member.items||[]).map((item,idx)=>(
                          <div key={idx} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderTop:'1px solid #eee'}}>
                            <div>
                              <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
                              <div style={{fontSize:11,color:'var(--muted)'}}>{item.opts&&!item.isFood&&[item.opts.spec,item.opts.sugar,item.opts.milk].filter(Boolean).join(' / ')}</div>
                            </div>
                            <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                              <div style={{fontSize:13,fontWeight:600,color:'var(--org)'}}>NT${(item.price||0)*(item.qty||1)}</div>
                              <div style={{fontSize:11,color:'var(--muted)'}}>{item.qty||1}份</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })
              }
            </div>
            <div style={{padding:'12px 20px 24px',borderTop:'1px solid #f0f0f0',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontWeight:700,fontSize:15}}>
                <span>團購總金額</span><span style={{color:'var(--org)'}}>NT${totalAll}</span>
              </div>
              <button onClick={openCheckout} disabled={memberCount===0}
                style={{width:'100%',padding:14,background:memberCount===0?'#ccc':'var(--org)',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:memberCount===0?'not-allowed':'pointer'}}>
                一般商品結帳 →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 結帳 Sheet */}
      {showCheckout&&(
        <CheckoutSheet
          groupRoom={groupRoom}
          groupItems={groupItems}
          currentStore={currentStore}
          onClose={()=>setShowCheckout(false)}
          showToast={showToast}
          setConfirmOrder={setConfirmOrder}
          setGroupRoom={setGroupRoom}
          setTab={setTab}
        />
      )}
    </>
  );
}

/* ─── ORDER DETAIL PAGE ─── */
function OrderDetailPage({order,setTab}){
  if(!order)return null;
  const pickup=new Date(order.pickup_time);
  const no=order.no;
  const pickupStr=pickup.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-')+' '+pickup.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  const createdStr=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-')+' '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  const invLabel=order.invType==='mobile'?'手機載具 - '+(order.mobileCarrier||''):order.invType==='paper'?'紙本發票':order.invType==='donate'?'愛心捐贈':'手機載具';
  const groupItems=order.groupItems||[];
  const storeName=order.storeName||'路易莎 逢甲大學門市';
  const storePhone=order.storePhone||'04-24523131';
  const storeAddr=order.storeAddr||'台中市西屯區文華路100號';
  const pickupNo=parseInt(no.slice(-3))||Math.floor(100+Math.random()*900);

  function copyNo(){
    navigator.clipboard.writeText(no).then(()=>{}).catch(()=>{});
  }

  const rowStyle={display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'};
  const labelStyle={fontSize:14,color:'var(--muted)'};
  const valStyle={fontSize:14,fontWeight:600,textAlign:'right',maxWidth:'58%'};

  return(
    <div style={{background:'#f5f5f5',minHeight:'100vh',paddingBottom:32}}>

      {/* 門市資訊卡 */}
      <div style={{background:'#fff',margin:'12px 16px',borderRadius:14,padding:'18px 16px',boxShadow:'0 2px 12px rgba(0,0,0,.07)'}}>
        {/* 門市 header */}
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
          <div style={{width:60,height:60,borderRadius:'50%',background:'var(--org)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0,color:'#fff'}}>☕</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:17,marginBottom:5}}>{storeName}</div>
            <div style={{fontSize:13,color:'var(--org)',marginBottom:2}}>📞 {storePhone}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>📍 {storeAddr}</div>
          </div>
        </div>

        {/* 取貨號橘色大條 */}
        <div style={{background:'var(--org)',borderRadius:8,padding:'12px 18px',marginBottom:16}}>
          <span style={{color:'#fff',fontWeight:700,fontSize:17}}>取貨號 - {pickupNo}</span>
        </div>

        {/* 訂單資訊列 */}
        <div style={rowStyle}>
          <span style={labelStyle}>訂單編號</span>
          <span style={{...valStyle,color:'var(--org)',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}} onClick={copyNo}>
            {no} <span style={{fontSize:16}}>📋</span>
          </span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>訂單狀態</span>
          <span style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{background:'#e8f5e9',color:'#2e7d32',padding:'4px 12px',borderRadius:6,fontSize:13,fontWeight:700}}>完成</span>
            <span style={{fontSize:13,color:'var(--org)',cursor:'pointer'}}>查詢進度</span>
          </span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>訂單類型</span>
          <span style={valStyle}>一般商品</span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>預計取貨時間</span>
          <span style={{...valStyle,color:'var(--org)'}}>{pickupStr}</span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>付款金額</span>
          <span style={{...valStyle,color:'var(--org)'}}>NT${order.total}</span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>付款方式</span>
          <span style={valStyle}>{order.pay||'LINE Pay'}</span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>開立發票方式</span>
          <span style={valStyle}>{invLabel}</span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>取貨方式</span>
          <span style={valStyle}>{order.pickup==='self'?'自取':'外送'}</span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>取貨人</span>
          <span style={valStyle}>{order.recipientName||'-'}</span>
        </div>
        <div style={rowStyle}>
          <span style={labelStyle}>聯絡電話</span>
          <span style={valStyle}>{order.phone||'-'}</span>
        </div>
        <div style={{...rowStyle,borderBottom:'none'}}>
          <span style={labelStyle}>訂單建立時間</span>
          <span style={valStyle}>{createdStr}</span>
        </div>
      </div>

      {/* 購物內容 — 揪團：每人一個區塊（圖2樣式） */}
      {order.isGroup&&groupItems.length>0
        ?groupItems.map(member=>{
          const cnt=(member.items||[]).reduce((s,i)=>s+(i.qty||1),0);
          const sub=member.subtotal||0;
          return(
            <div key={member.id} style={{background:'#fff',margin:'0 16px 10px',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
              {/* 成員 header */}
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',borderBottom:'1px solid var(--border)'}}>
                <div style={{width:46,height:46,borderRadius:'50%',background:'var(--org)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,flexShrink:0}}>
                  {(member.member_name||'?')[0]}
                </div>
                <div style={{flex:1,fontWeight:700,fontSize:16}}>{member.member_name}</div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--muted)'}}>NT${sub} / {cnt} 份</div>
              </div>
              {/* 品項列表 — 不折疊，直接展開（像圖2） */}
              {(member.items||[]).map((item,idx)=>(
                <div key={idx} style={{padding:'12px 16px',borderBottom:'1px solid #f5f5f5'}}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{item.name}</div>
                  <div style={{fontSize:13,color:'var(--muted)'}}>
                    {item.opts&&!item.isFood&&[item.opts.spec,item.opts.sugar,item.opts.milk].filter(Boolean).join(' / ')}
                    {item.opts&&!item.isFood&&' / '}
                    NT${(item.price||0)*(item.qty||1)} / {item.qty||1}份
                  </div>
                </div>
              ))}
            </div>
          );
        })
        /* 一般訂單（非揪團）：按 member 分群或列出所有品項 */
        :<div style={{background:'#fff',margin:'0 16px 10px',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
          {/* 若 items 有 member 欄位，按人分群 */}
          {(()=>{
            const items=order.items||[];
            const byMember={};
            let hasMembers=false;
            items.forEach(i=>{
              const m=i.member||'';
              if(m) hasMembers=true;
              if(!byMember[m]) byMember[m]=[];
              byMember[m].push(i);
            });
            if(hasMembers){
              return Object.entries(byMember).map(([mName,mitems])=>(
                <div key={mName} style={{borderBottom:'1px solid var(--border)'}}>
                  {mName&&<div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid #f5f5f5',background:'#fafafa'}}>

                    <span style={{fontWeight:700,fontSize:15}}>{mName}</span>
                    <span style={{fontSize:13,color:'var(--muted)',marginLeft:'auto'}}>NT${mitems.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0)} / {mitems.reduce((s,i)=>s+(i.qty||1),0)}份</span>
                  </div>}
                  {mitems.map((item,idx)=>(
                    <div key={idx} style={{padding:'11px 16px',borderBottom:'1px solid #f5f5f5'}}>
                      <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{item.name}</div>
                      <div style={{fontSize:13,color:'var(--muted)'}}>NT${(item.price||0)*(item.qty||1)} / {item.qty||1}份</div>
                    </div>
                  ))}
                </div>
              ));
            }
            return items.map((item,idx)=>(
              <div key={idx} style={{padding:'12px 16px',borderBottom:'1px solid #f5f5f5'}}>
                <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{item.name}</div>
                <div style={{fontSize:13,color:'var(--muted)'}}>NT${(item.price||0)*(item.qty||1)} / {item.qty||1}份</div>
              </div>
            ));
          })()}
          {/* 金額總計 */}
          <div style={{padding:'13px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:14,color:'var(--muted)'}}>商品 x{(order.items||[]).reduce((s,i)=>s+(i.qty||1),0)}</span>
            <span style={{fontSize:14,fontWeight:600}}>NT${order.total}</span>
          </div>
        </div>
      }

      {/* 揪團訂單的金額總計 */}
      {order.isGroup&&groupItems.length>0&&(
        <div style={{background:'#fff',margin:'0 16px 16px',borderRadius:14,padding:'13px 16px',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,fontSize:14,color:'var(--muted)'}}>
            <span>商品 x{groupItems.reduce((s,m)=>s+((m.items||[]).reduce((ss,i)=>ss+(i.qty||1),0)),0)}</span>
            <span>NT${groupItems.reduce((s,m)=>s+(m.subtotal||0),0)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:8,borderTop:'1px solid var(--border)'}}>
            <span style={{fontSize:16,fontWeight:900,color:'var(--org)'}}>應付金額</span>
            <span style={{fontSize:18,fontWeight:900,color:'var(--org)'}}>NT${order.total}</span>
          </div>
        </div>
      )}

      <button onClick={()=>setTab('home')} style={{width:'calc(100% - 32px)',margin:'0 16px',padding:17,background:'var(--org)',color:'#fff',border:'none',borderRadius:12,fontSize:16,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>
        再次訂購
      </button>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const[tab,setTab]=useState('home');
  // groupCart: 揪團模式下自己的品項，不放 cart，只同步到 group_items
  const[cart,setCart]=useState([]);
  const[groupCart,setGroupCart]=useState([]);
  const[confirmOrder,setConfirmOrder]=useState(null);
  const[showToast,toastEl]=useToast();
  const[searching,setSearching]=useState(false);
  const[searchQ,setSearchQ]=useState('');
  const searchRef=useRef(null);
  const[globalMember,setGlobalMember]=useState(null);
  const[groupRoom,setGroupRoom]=useState(null);
  const[groupClosed,setGroupClosed]=useState(false);
  const[myGroupName,setMyGroupName]=useState('');
  const[currentStore,setCurrentStore]=useState(STORES[0]);

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const code=params.get('group');const gname=params.get('name');
    if(code){
      db.from('group_orders').select('status,creator_name').eq('room_code',code).single().then(({data})=>{
        if(data&&data.status==='closed'){setGroupClosed(true);showToast('⚠️ 此揪團已關閉');}
        else{
          setGroupRoom({room_code:code,creator_name:data?.creator_name||gname||'',isCreator:false});
          setTab('menu');
          // 非主揪：名字從 URL param 取得（主揪傳連結時不含名字，所以會是空的需要輸入）
          if(gname) setMyGroupName(gname);
        }
      });
    }
  },[]);

  useEffect(()=>{
    if(!groupRoom)return;
    const t=setInterval(async()=>{
      const{data}=await db.from('group_orders').select('status').eq('room_code',groupRoom.room_code).single();
      if(data&&(data.status==='closed'||data.status==='processing')&&!groupRoom.isCreator){
        setGroupClosed(true);showToast('⚠️ 主揪已開始結帳，無法繼續點餐');
      }
    },4000);
    return()=>clearInterval(t);
  },[groupRoom]);

  // 同步 groupCart 到 DB
  const syncGroupCart=useCallback(async(newCart,name)=>{
    if(!groupRoom||!name)return;
    const subtotal=newCart.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
    const{data:ex}=await db.from('group_items').select('id').eq('room_code',groupRoom.room_code).eq('member_name',name).limit(1);
    if(ex&&ex.length>0) await db.from('group_items').update({items:newCart,subtotal}).eq('id',ex[0].id);
    else await db.from('group_items').insert([{room_code:groupRoom.room_code,member_name:name,items:newCart,subtotal}]);
  },[groupRoom]);

  const cartCount=groupRoom?0:cart.reduce((s,i)=>s+(i.qty||1),0);
  const storeName=currentStore.short||currentStore.name.replace('路易莎 ','');

  function goBack(){
    if(tab==='menu'){setSearching(false);setSearchQ('');setTab('home');}
    if(tab==='confirm')setTab('home');
  }

  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh',background:'var(--bg)'}}>
      <div className="top-bar">
        {searching&&tab==='menu'
          ?<div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
              <button onClick={()=>{setSearching(false);setSearchQ('');}} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',padding:'0 4px',color:'var(--text)'}}>←</button>
              <input ref={searchRef} value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="搜尋商品名稱..."
                style={{flex:1,border:'none',outline:'none',fontSize:15,fontFamily:'inherit',background:'transparent'}}/>
              {searchQ&&<button onClick={()=>setSearchQ('')} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:'#aaa',padding:'0 4px'}}>✕</button>}
            </div>
          :<div style={{display:'flex',alignItems:'center',gap:4,flex:1}}>
              {['menu','confirm'].includes(tab)&&<span className="back" onClick={goBack}>←</span>}
              <h1 style={{fontSize:tab==='menu'&&storeName.length>7?14:17}}>{tab==='home'?'':tab==='menu'?storeName:tab==='cart'?'購物車':tab==='confirm'?'訂單明細':'我的'}</h1>
              {groupRoom&&!groupClosed&&tab==='menu'&&<span style={{fontSize:11,background:'var(--org)',color:'#fff',padding:'2px 7px',borderRadius:8,marginLeft:4,fontWeight:700}}>揪團中</span>}
              {groupClosed&&tab==='menu'&&<span style={{fontSize:11,background:'#bbb',color:'#fff',padding:'2px 6px',borderRadius:8,marginLeft:4,fontWeight:700,display:'inline-flex',alignItems:'center',gap:2}}><span style={{textDecoration:'line-through',opacity:.7}}>揪團</span><span style={{fontSize:9}}>已關閉</span></span>}
            </div>
        }
        {tab==='menu'&&!searching&&<span style={{fontSize:22,cursor:'pointer'}} onClick={()=>{setSearching(true);setTimeout(()=>searchRef.current&&searchRef.current.focus(),80)}}>🔍</span>}
      </div>

      <div className="page-wrap" style={{flex:1}}>
        {tab==='home'&&<HomePage setTab={setTab} setGroupRoom={setGroupRoom} showToast={showToast} setCurrentStore={setCurrentStore} setMyGroupName={setMyGroupName}/>}
        {tab==='menu'&&<MenuPage
          cart={groupRoom?groupCart:cart} setCart={groupRoom?setGroupCart:setCart}
          showToast={showToast} searchQ={searchQ}
          globalMember={globalMember} setGlobalMember={setGlobalMember}
          groupRoom={groupRoom} groupClosed={groupClosed}
          myGroupName={myGroupName} setMyGroupName={setMyGroupName}
          syncGroupCart={syncGroupCart}
          currentStore={currentStore}
        />}
        {tab==='cart'&&<CartPage cart={cart} setCart={setCart} setTab={setTab} setConfirmOrder={setConfirmOrder} showToast={showToast} globalMember={globalMember} setGlobalMember={setGlobalMember} currentStore={currentStore}/>}
        {tab==='confirm'&&<OrderDetailPage order={confirmOrder} setTab={setTab}/>}
        {tab==='my'&&<MyPage globalMember={globalMember} setGlobalMember={setGlobalMember}/>}
      </div>

      <div className="bottom-nav">
        {[
          {k:'home',i:'🏠',l:'訂購'},
          {k:'menu',i:'☕',l:'點購'},
          {k:'cart',i:'🛒',l:'購物車',badge:cartCount},
          {k:'my',i:'👤',l:'我的'},
        ].map(n=>(
          <button key={n.k} className={`nav-btn${tab===n.k?' active':''}`} onClick={()=>setTab(n.k)}>
            <span className="ni" style={{position:'relative'}}>
              {n.i}
              {(n.badge||0)>0&&<span style={{position:'absolute',top:-4,right:-6,background:'var(--red)',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{n.badge}</span>}
            </span>
            <span>{n.l}</span>
          </button>
        ))}
      </div>

      {groupRoom&&!groupClosed&&tab==='menu'&&(
        <GroupBottomBar
          groupRoom={groupRoom} myName={myGroupName}
          currentStore={currentStore} showToast={showToast}
          setGroupRoom={setGroupRoom} setConfirmOrder={setConfirmOrder}
          setTab={setTab}
        />
      )}
      {toastEl}
    </div>
  );
}

/* ─── HOME PAGE ─── */
function HomePage({setTab,setGroupRoom,showToast,setCurrentStore,setMyGroupName}){
  const[groupModal,setGroupModal]=useState(false);
  const[creatorName,setCreatorName]=useState('');
  const[creating,setCreating]=useState(false);
  const[groupInfo,setGroupInfo]=useState(null);
  const[storeQ,setStoreQ]=useState('');
  const[storeResults,setStoreResults]=useState([]);
  const baseUrl=window.location.href.split('?')[0];

  function searchStores(q){
    setStoreQ(q);
    if(!q.trim()){setStoreResults([]);return;}
    setStoreResults(STORES.filter(s=>s.name.includes(q)||s.addr.includes(q)));
  }

  function selectStore(store){
    setCurrentStore(store);setStoreQ('');setStoreResults([]);setTab('menu');
  }

  async function createGroup(){
    if(!creatorName.trim()){showToast('請輸入你的名字');return;}
    setCreating(true);
    const code='G'+Math.random().toString(36).substr(2,6).toUpperCase();
    const{error}=await db.from('group_orders').insert([{room_code:code,creator_name:creatorName.trim(),status:'open'}]);
    if(error){showToast('❌ 建立失敗：'+error.message);setCreating(false);return;}
    await db.from('group_items').insert([{room_code:code,member_name:creatorName.trim(),items:[],subtotal:0}]);
    const url=baseUrl+'?group='+code+'&name='+encodeURIComponent(creatorName.trim());
    const qr='https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(url);
    setGroupInfo({room_code:code,url,qr});
    setGroupRoom({room_code:code,creator_name:creatorName.trim(),isCreator:true});
    setMyGroupName(creatorName.trim());
    setCreating(false);
  }

  function copyLink(){
    navigator.clipboard.writeText(groupInfo.url).then(()=>showToast('✅ 連結已複製！')).catch(()=>{
      const el=document.createElement('textarea');el.value=groupInfo.url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
      showToast('✅ 連結已複製！');
    });
  }

  return(
    <div style={{paddingBottom:16}}>
      <div className="loc-bar">📍<span style={{marginLeft:4}}>當前位置：台中市西屯區...</span><span style={{color:'var(--muted)',fontSize:11,marginLeft:3}}>▼</span></div>
      <div style={{padding:'0 16px 8px',position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'#f0f0f0',borderRadius:24,padding:'10px 16px'}}>
          <span style={{color:'var(--muted)'}}>🔍</span>
          <input value={storeQ} onChange={e=>searchStores(e.target.value)} placeholder="搜尋門市（逢甲、文心、一中…）"
            style={{flex:1,border:'none',background:'none',outline:'none',fontSize:13,fontFamily:'inherit'}}/>
          {storeQ&&<button onClick={()=>{setStoreQ('');setStoreResults([]);}} style={{background:'none',border:'none',fontSize:15,cursor:'pointer',color:'#aaa',padding:0}}>✕</button>}
        </div>
        {storeResults.length>0&&(
          <div style={{position:'absolute',top:'100%',left:16,right:16,background:'#fff',borderRadius:12,boxShadow:'0 4px 20px rgba(0,0,0,.12)',zIndex:60,overflow:'hidden',marginTop:3}}>
            {storeResults.map((s,i)=>(
              <div key={s.id} onClick={()=>selectStore(s)}
                style={{padding:'11px 16px',borderBottom:i<storeResults.length-1?'1px solid #f0f0f0':'none',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}
                onMouseEnter={e=>e.currentTarget.style.background='#fff3e0'}
                onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                <span style={{fontSize:18}}>🏪</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:'var(--org)'}}>{s.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>📍 {s.addr}</div>
                </div>
                <span style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>{s.dist} km</span>
              </div>
            ))}
          </div>
        )}
        {storeQ&&storeResults.length===0&&(
          <div style={{position:'absolute',top:'100%',left:16,right:16,background:'#fff',borderRadius:12,boxShadow:'0 4px 20px rgba(0,0,0,.12)',zIndex:60,padding:'14px',textAlign:'center',fontSize:13,color:'var(--muted)',marginTop:3}}>
            找不到「{storeQ}」的門市
          </div>
        )}
      </div>

      <div style={{padding:'0 16px 10px'}}>
        <div style={{background:'linear-gradient(135deg,#E87722,#C45E0A)',borderRadius:14,padding:18,color:'#fff',position:'relative',minHeight:110,overflow:'hidden'}}>
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            <span style={{background:'rgba(255,255,255,.25)',padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700}}>第一重</span>
            <span style={{background:'rgba(255,255,255,.25)',padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700}}>第二重</span>
          </div>
          <div style={{fontSize:10,opacity:.85,marginBottom:2}}>+1元升級美式(M)</div>
          <div style={{fontSize:20,fontWeight:900,lineHeight:1.15}}>早餐派對<br/><span style={{fontSize:26}}>超值</span>更有感</div>
          <div style={{position:'absolute',top:10,right:14,background:'rgba(255,255,255,.2)',borderRadius:10,padding:'6px 12px',textAlign:'center'}}>
            <div style={{fontSize:10,opacity:.85}}>$</div>
            <div style={{fontSize:30,fontWeight:900,lineHeight:1}}>70</div>
            <div style={{fontSize:10,opacity:.85}}>起</div>
          </div>
        </div>
      </div>

      <div style={{padding:'0 16px'}}>
        <div style={{fontSize:16,fontWeight:700,color:'var(--org)',marginBottom:8}}>附近推薦店家</div>
        {STORES.slice(0,3).map((store,i)=>(
          <div key={store.id} className="store-card" onClick={()=>selectStore(store)} style={{cursor:'pointer',marginBottom:10}}>
            <div className="store-img" style={{background:['#c8d8c0','#d0c8e0','#d8c8c0'][i],height:110,fontSize:44}}>🏪</div>
            <div className="store-info">
              <div className="store-name">{store.name}</div>
              <div className="store-meta">📞 {store.phone} · ⭐ 4.{4+i} · {store.dist} 公里</div>
            </div>
          </div>
        ))}
      </div>

      <button className="launch-btn" onClick={()=>setGroupModal(true)}>🎉 快速發起揪團</button>

      {groupModal&&(
        <div className="modal-wrap" onClick={()=>{if(!groupInfo){setGroupModal(false);setCreatorName('');}}}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <button onClick={()=>{setGroupModal(false);setGroupInfo(null);setCreatorName('');}}
              style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#aaa'}}>✕</button>
            {!groupInfo?<>
              <div style={{fontWeight:700,fontSize:20,marginBottom:6}}>揪團分享</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:18}}>建立揪團，讓朋友掃 QR Code 一起點餐</div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:13,color:'var(--muted)',marginBottom:7}}>你的名字</div>
                <input value={creatorName} onChange={e=>setCreatorName(e.target.value)} placeholder="例：小明"
                  style={{width:'100%',border:'1.5px solid #e0e0e0',borderRadius:10,padding:'12px 14px',fontSize:15,fontFamily:'inherit',outline:'none',display:'block'}}
                  onFocus={e=>e.target.style.borderColor='var(--org)'} onBlur={e=>e.target.style.borderColor='#e0e0e0'}
                  onKeyDown={e=>e.key==='Enter'&&createGroup()}/>
              </div>
              <button onClick={createGroup} disabled={creating}
                style={{width:'100%',padding:15,background:'var(--org)',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>
                {creating?'建立中...':'🎉 建立揪團'}
              </button>
            </>:<>
              <div style={{fontWeight:700,fontSize:19,marginBottom:4,textAlign:'center'}}>揪團分享</div>
              <div style={{fontSize:13,color:'var(--muted)',textAlign:'center',marginBottom:14}}>分享連結給朋友，一起揪團點餐！</div>
              <div style={{background:'#f8f8f8',borderRadius:14,padding:14,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-around'}}>
                <div style={{fontSize:48}}>☕</div>
                <div style={{textAlign:'center'}}>
                  <img src={groupInfo.qr} alt="QR" style={{width:145,height:145,borderRadius:8,background:'#fff',padding:4,display:'block'}}/>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:5}}>掃碼加入揪團</div>
                </div>
              </div>
              <div style={{fontSize:14,color:'var(--org)',textAlign:'center',marginBottom:10,fontWeight:700}}>揪團代碼：{groupInfo.room_code}</div>
              <div style={{display:'flex',gap:8,marginBottom:10}}>
                <input readOnly value={groupInfo.url}
                  style={{flex:1,border:'1px solid #e0e0e0',borderRadius:8,padding:'9px 12px',fontSize:11,fontFamily:'monospace',background:'#f5f5f5',color:'#555',outline:'none'}}/>
                <button onClick={copyLink}
                  style={{padding:'9px 14px',background:'var(--org)',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontFamily:'inherit',fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>複製</button>
              </div>
              <button onClick={()=>{setGroupModal(false);setGroupInfo(null);setCreatorName('');setTab('menu');}}
                style={{width:'100%',padding:15,background:'#1a1a1a',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>
                開始點餐 →
              </button>
            </>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── MENU PAGE ─── */
function MenuPage({cart,setCart,showToast,searchQ,globalMember,setGlobalMember,groupRoom,groupClosed,myGroupName,setMyGroupName,syncGroupCart,currentStore}){
  const[products,setProducts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[cat,setCat]=useState(null); // null = 未選分類
  const[custom,setCustom]=useState(null);
  const[opts,setOpts]=useState({spec:'大熱',milk:'一般鮮奶',sugar:'無糖'});
  const[favorites,setFavorites]=useState(()=>{try{return JSON.parse(localStorage.getItem('louisa_favs')||'[]');}catch{return[];}});
  // 我的最愛：需要先輸入會員號碼
  const[memberPhone,setMemberPhone]=useState('');
  const[memberLogged,setMemberLogged]=useState(false);
  const[memberLookup,setMemberLookup]=useState(false);
  const[memberName,setMemberName]=useState('');
  // 非主揪人第一次進來要輸入名字
  const[nameModal,setNameModal]=useState(false);
  const[nameInput,setNameInput]=useState('');
  const nameInputRef=useRef(null);

  useEffect(()=>{
    if(groupRoom&&!groupRoom.isCreator&&!myGroupName){
      setNameModal(true);
      setTimeout(()=>nameInputRef.current&&nameInputRef.current.focus(),300);
    }
  },[groupRoom,myGroupName]);

  useEffect(()=>{
    db.from('products').select('*').eq('available',true).order('id').then(({data})=>{
      const prods=data||[];setProducts(prods);setLoading(false);
      // 預設分類：已登入會員 → 我的最愛；否則 → 第一個分類
      setCat(prev=>{
        if(prev) return prev;
        return '全部';
      });
    });
  },[]);

  // 登入後切換到我的最愛
  useEffect(()=>{
    if(memberLogged) setCat('我的最愛');
  },[memberLogged]);

  async function lookupMember(){
    if(!memberPhone.trim()){showToast('請輸入會員號碼');return;}
    setMemberLookup(true);
    const{data}=await db.from('customers').select('*').eq('phone',memberPhone.trim()).limit(1);
    setMemberLookup(false);
    if(data&&data.length>0){
      setMemberLogged(true);
      setMemberName(data[0].name||'會員');
      setGlobalMember&&setGlobalMember({phone:memberPhone.trim(),customer:data[0]});
      showToast('✅ 歡迎，'+(data[0].name||'會員')+'！');
      // 設定預設最愛（若空）
      setFavorites(prev=>{
        if(prev.length===0&&products.length>=2){
          const d=[products[0].id,products[1].id];
          try{localStorage.setItem('louisa_favs',JSON.stringify(d));}catch{}
          return d;
        }
        return prev;
      });
    } else {
      showToast('❌ 查無此會員號碼');
    }
  }

  async function confirmName(){
    if(!nameInput.trim()){showToast('請輸入你的名字');return;}
    setMyGroupName(nameInput.trim());
    setNameModal(false);
    showToast('🎉 已加入揪團！你是：'+nameInput.trim());
    if(cart.length>0) await syncGroupCart(cart,nameInput.trim());
  }

  async function submitMyOrder(){
    const name=myGroupName||groupRoom?.creator_name||'';
    if(!name){showToast('請先輸入你的名字');setNameModal(true);return;}
    if(cart.length===0){showToast('購物車是空的，請先選商品');return;}
    await syncGroupCart(cart,name);
    showToast('✅ 已送出你的餐點！等待主揪結帳');
  }

  const cats=[...new Set(products.map(p=>p.category))];
  const favProds=products.filter(p=>favorites.includes(p.id));
  const currentCat=cat||(cats[0]||'');
  let displayed=searchQ
    ?products.filter(p=>p.name.includes(searchQ))
    :currentCat==='我的最愛'?favProds
    :currentCat==='全部'?products
    :products.filter(p=>p.category===currentCat);

  function toggleFav(id){
    setFavorites(prev=>{const n=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];try{localStorage.setItem('louisa_favs',JSON.stringify(n));}catch{}return n;});
  }

  const isFood=custom&&FOOD_CATS.includes(custom.category);
  const milkExtra=opts.milk==='小農鮮奶'?10:0;

  async function addToCart(){
    if(groupClosed){showToast('⚠️ 揪團已關閉');return;}
    if(groupRoom&&!groupRoom.isCreator&&!myGroupName){setNameModal(true);return;}
    const extra=isFood?0:milkExtra;
    const key=(custom.id)+'_'+(opts.spec||'')+'_'+(opts.sugar||'')+'_'+(opts.milk||'');
    const newCart=cart.some(i=>i.cartKey===key)
      ?cart.map(i=>i.cartKey===key?{...i,qty:(i.qty||1)+1}:i)
      :[...cart,{id:Date.now(),cartKey:key,pid:custom.id,name:custom.name,opts:{...opts},price:custom.price+extra,qty:1,isFood:!!isFood}];
    setCart(newCart);
    showToast('✅ '+custom.name+' 已加入');
    setCustom(null);
    if(groupRoom&&!groupClosed){
      const name=myGroupName||groupRoom.creator_name||'';
      if(name) await syncGroupCart(newCart,name);
    }
  }

  if(loading)return<div className="loading"><div className="spin"/><span>載入中...</span></div>;

  const inGroup=groupRoom&&!groupClosed;
  const isCreator=groupRoom?.isCreator;
  const pbExtra=inGroup?'130px':'calc(var(--nav-h) + 4px)';

  return(
    <div>
      {/* 名字輸入 Modal（非主揪第一次進來） */}
      {nameModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 24px'}}>
          <div style={{background:'#fff',borderRadius:16,padding:'28px 24px',width:'100%',maxWidth:360}}>
            <div style={{fontSize:20,fontWeight:700,marginBottom:6,textAlign:'center'}}>🎉 加入揪團</div>

                <button onClick={()=>{setMemberLogged(false);setMemberPhone('');setMemberName('');setCat(cats[0]||'義式咖啡');}}

            :<>

                  {memberLookup?'查詢中':'確認'}
                </button>

      )}

      {displayed.length===0
        ?<div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)',fontSize:14}}>
            {searchQ?'沒有符合的商品':currentCat==='我的最愛'?'點擊商品上的 🤍 加入最愛':'此分類尚無商品'}
          </div>
        :<div className="prod-grid" style={{paddingBottom:pbExtra}}>
          {displayed.map(p=>{
            const isFav=favorites.includes(p.id);
            const inCartQty=cart.filter(i=>i.pid===p.id).reduce((s,i)=>s+(i.qty||1),0);
            return(
              <div key={p.id} className="prod-card" onClick={()=>{if(!groupClosed){setCustom(p);setOpts({spec:'大熱',milk:'一般鮮奶',sugar:'無糖'});}}}>

          <div style={{display:'flex',alignItems:'center',gap:8}}>

              </div>

            <button onClick={submitMyOrder} disabled={cart.length===0}

      {custom&&(
        <div className="modal-wrap" onClick={()=>setCustom(null)}>

            <div style={{fontSize:20,fontWeight:700,marginBottom:5}}>{custom.name}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:18}}>熱量：290kcal · 糖：33g · 咖啡因：<span style={{color:'var(--red)'}}>● 紅</span></div>
            {!isFood&&<>

                    <div key={o.v} className={`opt-chip${opts.milk===o.v?' sel':''}`} onClick={()=>setOpts(p=>({...p,milk:o.v}))}>{o.l}</div>
