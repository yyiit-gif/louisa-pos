function CartPage({cart,setCart,setTab,setConfirmOrder,showToast,globalMember,setGlobalMember,currentStore}){
  const[pickup,setPickup]=useState('self');
  const[pay,setPay]=useState('信用卡');
  const[phone,setPhone]=useState(globalMember?.phone||'');
  const[recipientName,setRecipientName]=useState(globalMember?.customer?.name||'');
  const[loading,setLoading]=useState(false);
  const[invType,setInvType]=useState('mobile');
  const[carrier,setCarrier]=useState('');
  const[taxId,setTaxId]=useState('');
  const[pickupTime,setPickupTime]=useState(()=>getTimeSlots('self')[0]||new Date());
  const slots=useMemo(()=>getTimeSlots(pickup),[pickup]);

  function switchPickup(v){setPickup(v);const ns=getTimeSlots(v);if(ns.length)setPickupTime(ns[0]);}

  if(cart.length===0)return(
    <div style={{textAlign:'center',padding:'70px 20px',color:'var(--muted)'}}>
      <div style={{fontSize:48,marginBottom:12}}>🛒</div>
      <div style={{fontWeight:600,marginBottom:8}}>購物車是空的</div>
      <div style={{fontSize:13}}>去點購頁選你喜歡的飲品吧！</div>
    </div>
  );

  const total=cart.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
  function updQty(id,d){setCart(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(0,(i.qty||1)+d)}:i).filter(i=>(i.qty||1)>0));}

  const inp={width:'100%',border:'1.5px solid var(--border)',borderRadius:10,padding:'11px 14px',fontSize:14,fontFamily:'inherit',outline:'none',display:'block'};
  const focIn=e=>e.target.style.borderColor='var(--org)';
  const focOut=e=>e.target.style.borderColor='var(--border)';

  async function checkout(){
    if(!recipientName.trim()){showToast('請填寫取貨人姓名');return;}
    if(!phone.trim()){showToast('請填寫聯絡電話');return;}
    setLoading(true);
    const no='M'+Math.floor(1000000000+Math.random()*9000000000);
    const insertData={
      order_no:no,
      member_phone:phone||null,
      items:cart,
      total,
      payment_method:pay,
      status:'paid',
      pickup_time:pickupTime.toISOString(),
      recipient_name:recipientName,
    };
    if(invType) insertData.inv_type=invType;
    if(invType==='mobile'&&carrier) insertData.mobile_carrier=carrier;
    if(taxId) insertData.tax_id=taxId;
    const{error}=await db.from('orders').insert([insertData]);
    if(error){showToast('❌ 下單失敗：'+error.message);setLoading(false);return;}
    if(phone){
      const{data:ex}=await db.from('customers').select('*').eq('phone',phone).limit(1);
      if(ex&&ex.length>0) await db.from('customers').update({total_orders:(ex[0].total_orders||0)+1,total_spent:(ex[0].total_spent||0)+total,last_order_at:new Date().toISOString()}).eq('phone',phone);
      else await db.from('customers').insert([{phone,name:recipientName||'顧客',total_orders:1,total_spent:total,last_order_at:new Date().toISOString()}]);
    }
    setLoading(false);
    setConfirmOrder({no,total,pickup_time:pickupTime.toISOString(),pickup,pay,items:cart,phone,invType,mobileCarrier:carrier,taxId,recipientName,storeName:currentStore.name,storePhone:currentStore.phone,storeAddr:currentStore.addr});
    setCart([]);setPhone('');setTab('confirm');
  }

  return(
    <div style={{padding:'12px 16px 16px'}}>
      {/* 品項 */}
      <div className="cart-section">
        {cart.map(item=>(
          <div key={item.id}>
            <div className="cart-row">
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{item.name} × {item.qty||1}</div>
                {item.opts&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{!item.isFood&&[item.opts.spec,item.opts.sugar,item.opts.milk].filter(Boolean).join(' / ')}</div>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:8}}>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <button onClick={()=>updQty(item.id,-1)} style={{width:24,height:24,border:'1px solid var(--border)',borderRadius:4,background:'#fff',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                  <span style={{fontSize:13,fontWeight:600,minWidth:14,textAlign:'center'}}>{item.qty||1}</span>
                  <button onClick={()=>updQty(item.id,1)} style={{width:24,height:24,border:'1px solid var(--border)',borderRadius:4,background:'#fff',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                </div>
                <span style={{fontSize:14,fontWeight:600,color:'var(--org)'}}>NT${(item.price||0)*(item.qty||1)}</span>
              </div>
            </div>
            <div className="divider"/>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:15,fontWeight:700}}>總金額</span>
          <span style={{fontSize:18,fontWeight:700,color:'var(--org)'}}>NT${total}</span>
        </div>
      </div>

      {/* 取貨人 */}
      <div className="cart-section">
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>取貨人姓名</div>
        <input style={inp} value={recipientName} onChange={e=>setRecipientName(e.target.value)} placeholder="例：陳小明" onFocus={focIn} onBlur={focOut}/>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8,marginTop:12}}>聯絡電話</div>
        <input style={inp} value={phone} onChange={e=>setPhone(e.target.value)} placeholder="0912345678" onFocus={focIn} onBlur={focOut}/>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:4,textAlign:'right'}}>只支援台灣手機號碼</div>
      </div>

      {/* 取餐方式 */}
      <div className="cart-section">
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>取貨方式</div>
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          {[{v:'self',l:'自取'},{v:'delivery',l:'外送'}].map(o=>(
            <button key={o.v} onClick={()=>switchPickup(o.v)}
              style={{flex:1,padding:'10px',border:`1.5px solid ${pickup===o.v?'var(--org)':'var(--border)'}`,borderRadius:10,background:pickup===o.v?'var(--org-light)':'#fff',color:pickup===o.v?'var(--org)':'var(--text)',fontFamily:'inherit',fontSize:13,cursor:'pointer',fontWeight:pickup===o.v?700:400}}>
              {o.l}
            </button>
          ))}
        </div>
        <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>🕐 取餐時間</div>
        {slots.length===0
          ?<div style={{background:'#f5f5f5',borderRadius:8,padding:10,textAlign:'center',fontSize:12,color:'var(--muted)'}}>今日已無可選時段</div>
          :<div style={{overflowX:'auto',paddingBottom:4}} className="time-scroll-hide">
            <div style={{display:'flex',gap:7,width:'max-content'}}>
              {slots.map((s,i)=>{const label=s.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});const sel=pickupTime&&s.getTime()===pickupTime.getTime();return(
                <button key={i} onClick={()=>setPickupTime(s)}
                  style={{flexShrink:0,padding:'8px 12px',border:`1.5px solid ${sel?'var(--org)':'#e0e0e0'}`,borderRadius:10,fontSize:12,fontWeight:sel?700:400,color:sel?'#fff':'var(--text)',background:sel?'var(--org)':'#fff',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
                  {label}
                </button>
              );})}
            </div>
          </div>
        }
      </div>

      {/* 付款方式 */}
      <div className="cart-section">
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>支付方式</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {['LINE Pay','信用卡'].map(m=><div key={m} className={`pay-chip${pay===m?' sel':''}`} onClick={()=>setPay(m)}>{m}</div>)}
        </div>
      </div>

      {/* 發票 */}
      <div className="cart-section">
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>🧾 發票設定</div>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          {[{v:'mobile',l:'手機載具'},{v:'paper',l:'紙本發票'},{v:'donate',l:'愛心捐贈'}].map(o=>(
            <button key={o.v} onClick={()=>setInvType(o.v)}
              style={{flex:1,padding:'8px 2px',border:`1.5px solid ${invType===o.v?'var(--org)':'var(--border)'}`,borderRadius:8,fontSize:11,background:invType===o.v?'var(--org-light)':'#fff',color:invType===o.v?'var(--org)':'var(--text)',fontFamily:'inherit',cursor:'pointer',fontWeight:invType===o.v?700:400}}>
              {o.l}
            </button>
          ))}
        </div>
        {invType==='mobile'&&(
          <input value={carrier} onChange={e=>setCarrier(e.target.value.toUpperCase())} placeholder="/TS9EZ5L"
            style={{...inp,fontFamily:'monospace',marginBottom:8}} onFocus={focIn} onBlur={focOut}/>
        )}
        {invType==='donate'&&<div style={{fontSize:12,color:'var(--muted)',padding:'7px 10px',background:'#f5f5f5',borderRadius:8,marginBottom:8}}>發票將捐贈給社福機構，感謝您的愛心 ❤️</div>}
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>統一編號（公司戶選填）</div>
        <input value={taxId} onChange={e=>setTaxId(e.target.value.replace(/\D/g,'').slice(0,8))} placeholder="輸入8位數統一編號"
          style={inp} onFocus={focIn} onBlur={focOut}/>
      </div>

      <button onClick={checkout} disabled={loading||slots.length===0}
        style={{width:'100%',padding:16,background:loading||slots.length===0?'#ccc':'var(--org)',color:'#fff',border:'none',borderRadius:12,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:(loading||slots.length===0)?'not-allowed':'pointer',marginTop:4}}>
        {loading?'處理中...':'立即結帳'}
      </button>
    </div>
  );
}

/* ─── MY PAGE ─── */
function MyPage({globalMember,setGlobalMember}){
  const[inputPhone,setInputPhone]=useState('');
  const[customer,setCustomer]=useState(globalMember?.customer||null);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState('');
  const[orders,setOrders]=useState([]);
  const[subPage,setSubPage]=useState(null); // null=menu, 'profile','account','history','favorites','coupons','membercard','address','carrier','payment'
  // editable profile fields
  const[editName,setEditName]=useState('');
  const[editPhone,setEditPhone]=useState('');
  const[editBirth,setEditBirth]=useState('');
  const[editEmail,setEditEmail]=useState('');
  const[editCarrier,setEditCarrier]=useState('');
  const[saving,setSaving]=useState(false);
  const[saveMsg,setSaveMsg]=useState('');

  async function login(){
    if(!inputPhone.trim())return;setLoading(true);setMsg('');
    const{data}=await db.from('customers').select('*').eq('phone',inputPhone.trim()).limit(1);
    if(!data||data.length===0){setMsg('❌ 找不到此電話的會員資料');setLoading(false);return;}
    const c=data[0];setCustomer(c);
    setEditName(c.name||'');setEditPhone(c.phone||'');setEditBirth(c.birthday||'');setEditEmail(c.email||'');setEditCarrier(c.carrier||'');
    const{data:od}=await db.from('orders').select('*').eq('member_phone',inputPhone.trim()).order('created_at',{ascending:false}).limit(30);
    setOrders(od||[]);
    setGlobalMember&&setGlobalMember({phone:inputPhone.trim(),customer:c,orders:od||[]});
    setLoading(false);
  }

  function getLevel(spent){
    if(spent>=5000)return{l:'黑卡會員',c:'#fff',bg:'linear-gradient(135deg,#1a1a1a,#3a3a3a)',badge:'⬛'};
    if(spent>=2000)return{l:'金卡會員',c:'#7a5500',bg:'linear-gradient(135deg,#f9d423,#e3a000)',badge:'🥇'};
    if(spent>=500)return{l:'銀卡會員',c:'#445',bg:'linear-gradient(135deg,#bdc3c7,#909ca5)',badge:'🥈'};
    return{l:'一般會員',c:'#555',bg:'linear-gradient(135deg,#e0e0e0,#bdbdbd)',badge:'👤'};
  }

  async function saveProfile(){
    setSaving(true);setSaveMsg('');
    const{error}=await db.from('customers').update({name:editName,birthday:editBirth,email:editEmail}).eq('phone',editPhone);
    setSaving(false);
    if(!error){setSaveMsg('✅ 儲存成功');setCustomer(c=>({...c,name:editName,birthday:editBirth,email:editEmail}));}
    else setSaveMsg('❌ 儲存失敗：'+error.message);
  }

  async function saveCarrier(){
    setSaving(true);setSaveMsg('');
    const{error}=await db.from('customers').update({carrier:editCarrier}).eq('phone',editPhone);
    setSaving(false);
    if(!error){setSaveMsg('✅ 載具已儲存');setCustomer(c=>({...c,carrier:editCarrier}));}
    else setSaveMsg('❌ '+error.message);
  }

  function logout(){setCustomer(null);setInputPhone('');setOrders([]);setSubPage(null);setGlobalMember&&setGlobalMember(null);}

  const inp2={width:'100%',border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',fontSize:15,fontFamily:'inherit',outline:'none',display:'block',marginBottom:12};

  // ── 未登入 ──
  if(!customer) return(
    <div style={{padding:'20px 16px'}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:72,height:72,borderRadius:'50%',background:'linear-gradient(135deg,var(--org),var(--org-dark)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,margin:'0 auto 12px',color:'#fff'}}>☕</div>
        <div style={{fontWeight:700,fontSize:17,marginBottom:4}}>LOUISA COFFEE</div>
        <div style={{fontSize:13,color:'#888'}}>登入以查看會員資料</div>
      </div>
      <div className="cart-section">
        <div style={{fontWeight:600,fontSize:14,marginBottom:8,color:'var(--muted)'}}>手機號碼</div>
        <input value={inputPhone} onChange={e=>setInputPhone(e.target.value)} placeholder="例：0912345678"
          style={inp2} onKeyDown={e=>e.key==='Enter'&&login()}
          onFocus={e=>e.target.style.borderColor='var(--org)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        {msg&&<div style={{color:'var(--red)',fontSize:13,marginBottom:8}}>{msg}</div>}
        <button onClick={login} disabled={loading}
          style={{width:'100%',padding:14,background:'var(--org)',color:'#fff',border:'none',borderRadius:10,fontSize:15,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>
          {loading?'查詢中...':'登入'}
        </button>
      </div>
    </div>
  );

  const lv=getLevel(customer.total_spent||0);

  // ── 子頁面 ──
  if(subPage){
    const backBtn=(
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'14px 16px 8px',cursor:'pointer'}} onClick={()=>{setSubPage(null);setSaveMsg('');}}>
        <span style={{fontSize:20}}>←</span><span style={{fontWeight:600,fontSize:15}}>返回</span>
      </div>
    );

    if(subPage==='profile') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{width:80,height:80,borderRadius:'50%',background:lv.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 8px'}}>{lv.badge}</div>
            <div style={{fontWeight:700,fontSize:16}}>{customer.name||'會員'}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>{customer.phone}</div>
          </div>
          <div className="cart-section">
            <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>個人資料</div>
            {[{l:'姓名',v:editName,set:setEditName,ph:'請輸入姓名'},{l:'電子信箱',v:editEmail,set:setEditEmail,ph:'example@email.com'},{l:'生日',v:editBirth,set:setEditBirth,ph:'1990-01-01'}].map(f=>(
              <div key={f.l} style={{marginBottom:12}}>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>{f.l}</div>
                <input value={f.v} onChange={e=>f.set(e.target.value)} placeholder={f.ph}
                  style={{...inp2,marginBottom:0}}
                  onFocus={e=>e.target.style.borderColor='var(--org)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
              </div>
            ))}
            {saveMsg&&<div style={{fontSize:13,color:saveMsg.startsWith('✅')?'#2e7d32':'var(--red)',marginBottom:8}}>{saveMsg}</div>}
            <button onClick={saveProfile} disabled={saving}
              style={{width:'100%',padding:13,background:saving?'#ccc':'var(--org)',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>
              {saving?'儲存中...':'儲存變更'}
            </button>
          </div>
        </div>
      </div>
    );

    if(subPage==='account') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div className="cart-section">
            <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>帳號管理</div>
            {[{l:'手機號碼',v:customer.phone,note:'手機號碼不可更改'},{l:'會員等級',v:lv.l},{l:'累積消費',v:'NT$'+(customer.total_spent||0).toLocaleString()},{l:'消費次數',v:(customer.total_orders||0)+' 次'}].map(row=>(
              <div key={row.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:14,fontWeight:500}}>{row.l}</div>
                  {row.note&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{row.note}</div>}
                </div>
                <span style={{fontSize:14,fontWeight:600,color:'var(--org)'}}>{row.v}</span>
              </div>
            ))}
          </div>
          <button onClick={logout} style={{width:'100%',padding:13,background:'#fff',border:'1.5px solid var(--red)',borderRadius:10,fontSize:14,fontFamily:'inherit',fontWeight:600,cursor:'pointer',color:'var(--red)',marginTop:8}}>
            登出帳號
          </button>
        </div>
      </div>
    );

    if(subPage==='history') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>曾點過的商品</div>
          {orders.length===0
            ?<div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)',fontSize:14}}>尚無訂單記錄</div>
            :orders.map(o=>(
              <div key={o.id} className="cart-section" style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <span style={{fontWeight:700,fontSize:13,color:'var(--org)'}}>{o.order_no}</span>
                  <span style={{fontSize:13,fontWeight:700}}>NT${o.total}</span>
                </div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>{new Date(o.created_at).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'})} · {o.payment_method}</div>
                {(o.items||[]).map((item,idx)=>(
                  <div key={idx} style={{fontSize:13,padding:'4px 0',borderTop:idx>0?'1px solid #f5f5f5':'none',display:'flex',justifyContent:'space-between'}}>
                    <span>{item.name} ×{item.qty||1}</span>
                    <span style={{color:'var(--org)'}}>NT${(item.price||0)*(item.qty||1)}</span>
                  </div>
                ))}
              </div>
            ))
          }
        </div>
      </div>
    );

    if(subPage==='favorites') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div className="cart-section">
            <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>最愛店家</div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>點餐頁使用 ❤️ 收藏的門市</div>
            {STORES.map(s=>(
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:24}}>🏪</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{s.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>📍 {s.addr}</div>
                </div>
                <span style={{fontSize:20}}>❤️</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    if(subPage==='coupons') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div className="cart-section" style={{textAlign:'center',padding:'40px 16px'}}>
            <div style={{fontSize:40,marginBottom:12}}>🎟️</div>
            <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>目前沒有優惠券</div>
            <div style={{fontSize:13,color:'var(--muted)'}}>參加活動或消費即可獲得優惠券</div>
          </div>
        </div>
      </div>
    );

    if(subPage==='membercard') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div style={{background:lv.bg,borderRadius:16,padding:24,marginBottom:12,textAlign:'center'}}>
            <div style={{fontSize:32,marginBottom:6}}>{lv.badge}</div>
            <div style={{fontSize:22,fontWeight:900,color:lv.c,marginBottom:4}}>{lv.l}</div>
            <div style={{fontSize:14,color:lv.c,opacity:.8}}>{customer.name||'會員'}</div>
          </div>
          <div className="cart-section">
            {[{l:'累積消費',v:'NT$'+(customer.total_spent||0).toLocaleString()},{l:'消費次數',v:(customer.total_orders||0)+' 次'},{l:'升級門檻',v:customer.total_spent>=5000?'已是最高等級':customer.total_spent>=2000?'距黑卡 NT$'+(5000-customer.total_spent):customer.total_spent>=500?'距金卡 NT$'+(2000-customer.total_spent):'距銀卡 NT$'+(500-(customer.total_spent||0))}].map(row=>(
              <div key={row.l} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:14,color:'var(--muted)'}}>{row.l}</span>
                <span style={{fontSize:14,fontWeight:700,color:'var(--org)'}}>{row.v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    if(subPage==='address') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div className="cart-section" style={{textAlign:'center',padding:'40px 16px'}}>
            <div style={{fontSize:40,marginBottom:12}}>📍</div>
            <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>尚未設定常用地址</div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>設定常用地址方便外送訂餐</div>
            <button style={{padding:'12px 28px',background:'var(--org)',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>
              + 新增地址
            </button>
          </div>
        </div>
      </div>
    );

    if(subPage==='carrier') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div className="cart-section">
            <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>我的載具</div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>設定後每次結帳自動帶入載具條碼</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>手機載具條碼（/+7碼英數）</div>
            <input value={editCarrier} onChange={e=>setEditCarrier(e.target.value.toUpperCase())} placeholder="/TS9EZ5L"
              style={{...inp2,fontFamily:'monospace',letterSpacing:2}}
              onFocus={e=>e.target.style.borderColor='var(--org)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:14}}>請至財政部電子發票整合服務平台申請手機載具</div>
            {saveMsg&&<div style={{fontSize:13,color:saveMsg.startsWith('✅')?'#2e7d32':'var(--red)',marginBottom:8}}>{saveMsg}</div>}
            <button onClick={saveCarrier} disabled={saving}
              style={{width:'100%',padding:13,background:saving?'#ccc':'var(--org)',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>
              {saving?'儲存中...':'儲存載具'}
            </button>
          </div>
        </div>
      </div>
    );

    if(subPage==='payment') return(
      <div style={{paddingBottom:20}}>
        {backBtn}
        <div style={{padding:'0 16px'}}>
          <div className="cart-section">
            <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>付款方式</div>
            {[{icon:'💳',l:'信用卡 / 金融卡',note:'Visa / Mastercard / JCB'},{icon:'📱',l:'LINE Pay',note:'LINE Pay 行動支付'},{icon:'🏪',l:'現場付款',note:'到店現金或刷卡'}].map(p=>(
              <div key={p.l} style={{display:'flex',alignItems:'center',gap:14,padding:'13px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
                <span style={{fontSize:24}}>{p.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{p.l}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{p.note}</div>
                </div>
                <span style={{fontSize:16,color:'var(--muted)'}}>›</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── 主選單 ──
  const menuItems=[
    {icon:'👤',l:'個人檔案',sub:'查看並編輯個人資料',page:'profile'},
    {icon:'⚙️',l:'帳號管理',sub:'等級、消費記錄',page:'account'},
    {icon:'🧾',l:'曾點過',sub:'查看歷史訂單',page:'history'},
    {icon:'🏪',l:'最愛店家',sub:'收藏的門市',page:'favorites'},
    {icon:'🎟️',l:'優惠券',sub:'我的優惠券',page:'coupons',badge:0},
    {icon:'👑',l:'會員卡',sub:lv.l,page:'membercard'},
    {icon:'📍',l:'常用地址',sub:'外送常用地址',page:'address'},
    {icon:'🧾',l:'我的載具',sub:customer.carrier||'尚未設定',page:'carrier'},
    {icon:'💳',l:'付款方式',sub:'信用卡、LINE Pay',page:'payment'},
  ];

  return(
    <div style={{paddingBottom:24}}>
      {/* 會員 header */}
      <div style={{background:'#fff',padding:'16px',display:'flex',alignItems:'center',gap:14,borderBottom:'1px solid var(--border)'}}>
        <div style={{width:56,height:56,borderRadius:'50%',background:lv.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
          {lv.badge}
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{customer.name||'會員'}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{customer.phone}</div>
        </div>
        <div style={{background:'var(--org)',color:'#fff',borderRadius:8,padding:'4px 10px',fontSize:12,fontWeight:700}}>{lv.l.replace('會員','')}</div>
      </div>

      {/* 選單列表 */}
      <div style={{background:'#fff',marginTop:8}}>
        {menuItems.map((item,i)=>(
          <div key={item.page} onClick={()=>setSubPage(item.page)}
            style={{display:'flex',alignItems:'center',gap:14,padding:'16px',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'background .1s'}}
            onMouseEnter={e=>e.currentTarget.style.background='#fff8f3'}
            onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
            <div style={{width:40,height:40,borderRadius:10,background:'#f5f5f5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{item.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:15}}>{item.l}</div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{item.sub}</div>
            </div>
            <span style={{fontSize:18,color:'#ccc'}}>›</span>
          </div>
        ))}
      </div>

      <div style={{padding:'16px'}}>
        <button onClick={logout} style={{width:'100%',padding:13,background:'#fff',border:'1.5px solid #ddd',borderRadius:12,fontSize:14,fontFamily:'inherit',fontWeight:600,cursor:'pointer',color:'#888'}}>
          登出
        </button>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
